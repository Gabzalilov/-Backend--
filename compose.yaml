services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped

  ollama-model:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "${OLLAMA_MODEL:-deepseek-r1:1.5b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file: .env
    environment:
      AI_ENABLED: "true"
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:1.5b}
    depends_on:
      ollama:
        condition: service_healthy
      ollama-model:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./outbox:/app/outbox
    restart: unless-stopped

volumes:
  ollama-data:
